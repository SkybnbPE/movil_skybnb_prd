name: skybnb
description: App de gestión de propiedades para Skybnb
publish_to: 'none'
version: 1.0.7+7

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Imágenes con cache
  cached_network_image: ^3.3.0

  # Variables de entorno
  flutter_dotenv: ^5.1.0

  # Almacenamiento seguro para tokens
  flutter_secure_storage: ^9.0.0

  # HTTP para requests a la API REST
  http: ^1.1.0

  # Formateo de fechas y monedas
  intl: ^0.18.1

  # State management
  provider: ^6.1.2

  # Calendario
  table_calendar: ^3.0.9

dev_dependencies:
  flutter_test:
    sdk: flutter
  very_good_analysis: ^5.1.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/logo.png
    - .env